name: Deploy website

on:
    push:
        branches:
            - generator
    pull_request:

jobs:
    deploy:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v3
            - name: Deploy
              uses: peaceiris/actions-gh-pages@v3
              if: github.ref == 'refs/heads/generator'
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./website
